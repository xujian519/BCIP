name: ci (upstream - disabled)

# BCIP 使用 bcip-ci.yml 代替此 workflow
# 此文件保留用于上游合并时参考，不会触发
on:
  workflow_dispatch: {}

jobs:
  changed:
    name: Detect desktop-related changes
    runs-on: ubuntu-latest
    outputs:
      desktop: ${{ steps.detect.outputs.desktop }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Detect changed paths (no external action)
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA='${{ github.event.pull_request.base.sha }}'
            HEAD_SHA='${{ github.event.pull_request.head.sha }}'
            mapfile -t files < <(git diff --name-only --no-renames "$BASE_SHA" "$HEAD_SHA")
          else
            BEFORE='${{ github.event.before }}'
            HEAD_SHA='${{ github.sha }}'
            if [[ -n "$BEFORE" && "$BEFORE" != "0000000000000000000000000000000000000000" ]]; then
              mapfile -t files < <(git diff --name-only --no-renames "$BEFORE" "$HEAD_SHA")
            else
              mapfile -t files < <(git diff --name-only --no-renames HEAD~1 "$HEAD_SHA" 2>/dev/null || true)
            fi
          fi

          desktop=false
          for f in "${files[@]}"; do
            case "$f" in
              apps/desktop/*|codex-rs/app-server/*|codex-rs/app-server-protocol/*|codex-rs/cli/*)
                desktop=true
                break
                ;;
              .github/workflows/ci.yml)
                desktop=true
                break
                ;;
            esac
          done

          echo "desktop=$desktop" >> "$GITHUB_OUTPUT"

  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Verify codex-rs Cargo manifests inherit workspace settings
        run: python3 .github/scripts/verify_cargo_workspace_manifests.py

      - name: Verify codex-tui does not import codex-core directly
        run: python3 .github/scripts/verify_tui_core_boundary.py

      - name: Verify Bazel clippy flags match Cargo workspace lints
        run: python3 .github/scripts/verify_bazel_clippy_lints.py

      - name: Test BCIP package builder
        run: python3 -m unittest discover -s scripts/codex_package -p 'test_*.py'

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Stage npm package
        id: stage_npm_package
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Use a recent successful rust-release run that published the full
          # cross-platform native payload required by the npm package layout.
          # Passing the workflow URL directly avoids relying on old rust-v*
          # branches remaining discoverable via `gh run list --branch ...`.
          CODEX_VERSION=0.133.0-alpha.4
          WORKFLOW_URL="https://github.com/xujian519/BCIP/actions/runs/26201494185"
          OUTPUT_DIR="${RUNNER_TEMP}"
          python3 ./scripts/stage_npm_packages.py \
            --release-version "$CODEX_VERSION" \
            --workflow-url "$WORKFLOW_URL" \
            --package codex \
            --output-dir "$OUTPUT_DIR"
          PACK_OUTPUT="${OUTPUT_DIR}/codex-npm-${CODEX_VERSION}.tgz"
          echo "pack_output=$PACK_OUTPUT" >> "$GITHUB_OUTPUT"

      - name: Upload staged npm package artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: codex-npm-staging
          path: ${{ steps.stage_npm_package.outputs.pack_output }}

      - name: Ensure root README.md contains only ASCII and certain Unicode code points
        run: ./scripts/asciicheck.py README.md
      - name: Check root README ToC
        run: python3 scripts/readme_toc.py README.md

      - name: Prettier (run `pnpm run format:fix` to fix)
        run: pnpm run format

  desktop-typescript:
    name: Desktop lint and build
    runs-on: ubuntu-latest
    needs: changed
    if: needs.changed.outputs.desktop == 'true'
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: ESLint
        working-directory: apps/desktop
        run: npm run lint

      - name: Typecheck desktop app
        working-directory: apps/desktop
        run: npm run build

      - name: Install Playwright Chromium
        working-directory: apps/desktop
        run: npm run test:e2e:install

      - name: Playwright E2E
        working-directory: apps/desktop
        env:
          CI: 'true'
          PLAYWRIGHT_BROWSERS_PATH: '0'
        run: npm run test:e2e

  desktop-generate-ts:
    name: Desktop generate-ts drift check
    runs-on: ubuntu-latest
    needs: changed
    if: needs.changed.outputs.desktop == 'true'
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - name: Check generated app-server types match generate-ts
        run: bash apps/desktop/scripts/check-generated-app-server.sh
