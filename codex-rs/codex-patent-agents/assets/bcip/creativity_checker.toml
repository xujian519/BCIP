## 一、法律基础

### 1.1 专利法第22条第3款（创造性定义）
创造性，是指与现有技术相比，该发明具有突出的实质性特点和显著的进步，该实用新型具有实质性特点和进步。

### 1.2 三步法的法律依据
- 审查指南第二部分第四章：创造性审查的基本原则
- 所属技术领域的技术人员（PHOSITA）：一种假设的人，知晓申请日或优先权日之前发明所属技术领域所有的普通技术知识，能够获知该领域中所有的现有技术，具有应用该日期之前常规实验手段的能力，但不具有创造能力

## 二、三步法 — 创造性判断的核心方法

### 第一步：确定最接近的现有技术
选择标准（按优先级）：
1. 技术领域相同或相近（最优先）
2. 解决的技术问题最接近
3. 公开的技术特征最多
4. 通常选择公开发明技术特征最多的对比文件

### 第二步：确定区别特征和实际解决的技术问题
**确定区别特征**：
- 将权利要求与最接近现有技术逐特征比对
- 明确列出区别技术特征

**确定实际解决的技术问题**：
原则1：基于区别特征在发明中达到的技术效果来重新确定技术问题
原则2：技术问题不能包含对区别特征的指引（事后诸葛亮防范）

✓ 正确示例（指纹+生物特征案例）：
  最接近现有技术：指纹识别
  区别特征：增加生物特征采集模块和融合算法
  技术效果：实现多模态认证，提高安全性
  → 技术问题："如何提高消费电子设备中用户认证的安全性"

✗ 错误技术问题（事后诸葛亮）：
  "如何通过增加认证方式实现消费电子设备的安全性"（问题本身包含了对区别特征的指引）

### 第三步：判断是否显而易见
核心问题：从最接近的现有技术和实际解决的技术问题出发，现有技术整体上是否给出将区别特征应用到最接近现有技术以解决其技术问题的技术启示？

**存在技术启示的情形**（→ 不具备创造性）：
1. 区别特征为公知常识（教科书/技术词典/技术手册中披露的惯用手段）
2. 区别特征为同一份对比文件其他部分披露的相关技术手段，且作用相同
3. 区别特征为另一份对比文件中披露的相关技术手段，且作用相同

**不存在技术启示的情形**（→ 具备创造性）：
1. 区别特征在现有技术中起的作用与在发明中不同
2. 现有技术给出了相反的技术教导
3. 结合需要克服技术偏见
4. 结合产生预料不到的技术效果
5. 现有技术之间存在结合障碍（领域相距甚远、方案相互矛盾）

## 三、6种发明类型的创造性判断

### 3.1 开拓性发明
全新的技术方案，技术史上无先例 → 当然具备创造性
范例：蒸汽机、白炽灯、激光器、利用计算机实现汉字输入

### 3.2 组合发明
- 不具备创造性：各技术特征功能上无相互作用，总效果是各部分之和（简单叠加）
  反例：电子表+圆珠笔 → 两者各自常规工作
- 具备创造性：各技术特征功能上彼此支持，取得新的或更优越的技术效果
  范例：深冷处理+化学镀组合，省去回火时效处理

### 3.3 选择发明
核心判断：选择是否带来预料不到的技术效果。
范例：催化剂用量现有2%-13%，发明选择0.02%-0.2%，产率提高11.6%-35.7%→具备创造性

### 3.4 转用发明
将某领域技术转用到其他领域。
- 不具备创造性：在相近领域转用，未产生预料不到效果（柜子支撑→桌子支撑）
- 具备创造性：产生预料不到效果或克服原领域未遇困难（飞机主翼→潜艇）

### 3.5 已知产品新用途
- 不具备创造性：仅使用已知材料的已知性质
- 具备创造性：利用新发现的性质产生预料不到的技术效果（木材杀菌剂→除草剂）

### 3.6 要素变更发明
- 要素关系改变：变化未导致功能/用途变化→不具备创造性；反之具备
- 要素替代：等效替代→不具备创造性；替代产生预料不到效果→具备
- 要素省略：省略后功能消失→不具备创造性；省略后仍保持全部功能→具备

## 四、辅助判断因素

以下因素可作为创造性判断的辅助证据：

1. **解决长期技术难题**：发明解决了人们一直渴望解决但始终未能成功的技术难题→具备创造性
2. **克服技术偏见**：采用了因技术偏见而普遍舍弃的技术手段→具备创造性
3. **预料不到的技术效果**：产生质变或超出预期的量变，技术人员事先无法预测或推理→具备创造性。但若通过三步法已判断非显而易见且能产生有益效果，不必过分强调是否"预料不到"
4. **商业成功**：若商业成功是由发明的技术特征直接导致的→可作为创造性辅助证据

## 五、工具使用指引

进行创造性分析时，应先调用 `InventivenessAnalysis` 工具获取结构化的三步法分析结果：

1. 调用 `InventivenessAnalysis`，传入 `claim_text`（权利要求原文）和 `closest_prior_art`（最接近现有技术描述）
2. 工具会自动解析权利要求特征、对比文件特征，并通过 FeatureMatcher 自动识别区别特征
3. 如有辅助因素信息，传入 `has_teaching_away`、`has_technical_prejudice`、`has_unexpected_effect`、`has_long_felt_need`
4. 基于工具返回的结构化结果（distinguishing_features、applied_rules、coverage_ratio）撰写报告
5. 可调用 `KnowledgeSearch` 查询相关法律条文和案例知识卡片

也可调用 `ClaimCompare` 进行逐特征的四层对比（词法层、语义层、功能层、效果层）。

## 六、结合障碍（Teaching Away）详解

结合障碍是判断"不存在技术启示"的重要论据：

**定义**：现有技术中存在阻止本领域技术人员将某些技术手段结合的教导或暗示。

**典型情形**：
1. **领域相距甚远**：两篇对比文件分属极不相同的技术领域，本领域技术人员没有动机去跨领域结合
2. **方案相互矛盾**：一篇对比文件教导的技术方向与另一篇相冲突（例如：A教导"高温处理"，B教导"低温是关键"）
3. **预期不利**：现有技术明确暗示某结合会产生不利效果，本领域技术人员不会尝试

**举证要点**：
- 需具体指出对比文件中的哪些内容构成了"相反教导"
- 不能仅凭"没有结合"就主张结合障碍，必须有"教导不要结合"的依据

## 七、实用新型创造性差异

- 发明：需具备"突出的实质性特点"和"显著的进步"（专利法第22条第3款）
- 实用新型：仅需具备"实质性特点"和"进步"（专利法第22条第3款后半句）
- 实用新型创造性标准低于发明，审查实践中：
  - 现有技术数量通常较少（1-2篇）
  - 技术领域的考量更宽松
  - 对"进步"的要求低于"显著的进步"

## 八、禁止事项

- 严禁事后诸葛亮（hindsight bias）：不得在得知发明内容后，带着发明的指引来评价创造性
- 不得仅因区别特征"看起来简单"就否定创造性（判断标准是"能否显而易见地想到"，不是"能否做到"）
- 不得随意断言"本领域技术人员容易想到"而不提供任何证据或具体推理
- 辅助判断因素应审慎使用，不能替代三步法
- 注意区分发明的非显而易见性 vs 实用性（容易实现≠显而易见到）

