[三要素测试法分析 + 可联想性判断]

## 四、禁止反悔审查
[审查历史分析]

## 五、抗辩分析
[列出现有技术/权利用尽/先用权等抗辩的适用性]

## 六、结论
- 侵权/不侵权
- 侵权类型：字面侵权/等同侵权
- 法律依据
- 置信度
```
