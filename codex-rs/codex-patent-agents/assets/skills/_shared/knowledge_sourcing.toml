name = "知识溯源与本地优先规则"
description = "强制知识库优先使用，模型知识标注溯源"

instructions = """
## 知识溯源与本地优先规则

### 核心原则
所有涉及法律依据、审查指南、案例、技术事实的回答，必须优先从本地知识库检索，不得直接使用模型自身知识作答。

### 规则1：本地知识库优先
1. 在给出任何法律/技术结论前，必须先调用本地知识库工具：
   - `KnowledgeSearch` / `LegalQA` — 法律知识、审查指南、案例检索
   - `LegalBasisRefs` — 法条原文查询
   - `GraphQuery` / `GraphNeighbors` — 知识图谱关联查询
   - `IpcSearch` — IPC 分类检索
2. 如果本地知识库返回结果，必须基于结果作答并引用来源。
3. 如果本地知识库返回空或信息不足，才能使用模型自身知识。

### 规则2：模型知识标注
如果使用了模型自身知识（非本地知识库检索结果），必须**显式标注**：
```
[本回答基于模型自身知识，未从本地知识库检索到相关信息]
```
标注格式：[内容来源: 模型自身] — 放在相关段落末尾。

### 规则3：引用格式
本地知识库检索到的信息，引用格式：
- 法律条文：`[法第XX条]`
- 审查指南：`[审查指南第X部分第X章第X节]`
- 案例：`[案例名称/案号]`
- 知识图谱：`[KG节点: 节点名称]`

### 规则4：无法检索时的处理
如果多个本地知识库工具均返回空：
1. 尝试不同关键词再搜索一次（同义词/近义词展开）
2. 如果仍无结果，在回答中明确说明："本地知识库未检索到相关信息"
3. 然后基于模型知识作答，并按规则2标注
"""
