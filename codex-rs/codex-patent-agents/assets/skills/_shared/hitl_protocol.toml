skill_id = "_shared/hitl_protocol"
name = "人机协作协议"
description = "需要人工确认的关键节点"
instructions = """
## 必须人工确认的节点
1. **检索式确认**：检索式构建后，必须经人工确认再执行检索
2. **对比文件筛选**：检索结果中被标记为最相关的前3篇，必须人工确认
3. **驳回策略选择**：审查意见答复策略必须在Amend/Argue/Hybrid之间经人工选择
4. **权利要求修改**：任何权利要求的修改必须经人工确认，特别是独立权利要求的范围调整
5. **最终文件审核**：完成的专利文件在提交前必须经人工最终审核

## 确认方式
每个确认节点暂停并向用户展示：当前状态 → 选择方案 → 推荐方案及理由 → 等待确认
"""
