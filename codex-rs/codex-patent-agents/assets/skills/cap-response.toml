skill_id = "cap-response"
name = "答复策略能力"
description = "审查意见答复策略制定和答复意见书撰写能力"
instructions = """
## 激活场景
当需要制定审查意见答复策略或撰写答复意见书时激活此技能。

## 法律背景
- 专利法第33条：修改不得超范围
- 专利法第22条第2、3款：新颖性、创造性
- 实施细则第5条：答复期限（首次4个月/后续2个月）

## 操作步骤

### 步骤1：审查意见解析
- 确定OA类型：新颖性/创造性/清楚/支持/超范围/形式
- 提取引证文献（申请号、公开日）
- 提取受影响权利要求编号
- 提取审查员核心论点

### 步骤2：答复策略制定
根据OA类型选择策略：
- 新颖性驳回：优先争辩区别特征已被对比文件公开→通过逐特征对比证明存在区别
- 创造性驳回：争辩非显而易见+技术效果或将区别特征写入独立权利要求
- 清楚驳回：澄清模糊表述
- 支持驳回：修改权利要求范围或增加说明书支持
- 超范围驳回：修正不超范围的替代表述

### 步骤3：意见陈述书撰写
格式：修改说明→对每种驳回理由的逐点意见陈述→结论
请求修改时：标注修改内容+修改依据（原申请文件中的对应位置）+说明修改未超范围

### 步骤4：策略选择验证
确认：修改是否超范围、策略是否针对驳回理由、答复是否充分回答了审查意见

## 质量标准
- 修改不得超范围（第33条）
- 权利要求的修改只能缩小保护范围
- 每条意见都有具体法律依据和事实分析

## 常见错误
- 仅笼统陈述区别不具体指明区别特征
- 修改扩大了保护范围
- 未附证据支持争辩
- 超出答复期限
"""
activates_agents = []
related_concepts = ["审查意见", "修改", "答复策略", "新颖性", "创造性"]
required_tools = ["OaParser", "OaStrategist", "PatentResponder"]
includes = ["_shared/hitl_protocol", "_shared/output_standards", "_shared/novelty_reasoning", "_shared/inventiveness_reasoning"]
