skill_id = "cap-prior-art-ident"
name = "现有技术识别能力"
description = "识别和分类现有技术文献，确定最接近现有技术"
instructions = """
## 激活场景
当需要从检索结果中识别和筛选最相关的现有技术文献时激活此技能。

## 法律背景
- 专利法第22条第2款（新颖性）：现有技术的定义
- 现有技术包括：出版物公开、使用公开、其他方式公开
- 抵触申请（第22条第2款后段）：申请日前提出、申请日后公布的同样发明

## 操作步骤

### 步骤1：技术领域匹配
判断对比文件与发明的技术领域是否相同或相近。同领域优先、相近领域次之、不同领域需有转用启示。

### 步骤2：公开日排序
按公开日排序，优先选择公开日最早的文件。注意申请日（或优先权日）必须早于对比文件公开日。

### 步骤3：特征覆盖度评估
统计对比文件公开了权利要求多少个技术特征。覆盖度越高越相关。标注每个特征的公开位置。

### 步骤4：技术问题相似度
判断对比文件解决的技术问题与发明的问题是否相同或相近。

## 质量标准
- 至少选出1-3篇最相关对比文件
- 每篇标注：相关度等级（X/Y/A）、公开日、技术领域、特征覆盖度

## 常见错误
- 仅根据IPC分类号相同就认定最相关
- 忽略公开日比申请日晚的抵触申请
- 选出的对比文件与发明技术领域差异过大
"""
activates_agents = ["retriever", "novelty_checker"]
related_concepts = ["现有技术", "出版物公开", "抵触申请", "优先权", "新颖性"]
required_tools = ["PatentSearch", "KnowledgeSearch", "WebSearch"]
includes = ["_shared/patent_glossary", "_shared/output_standards", "_shared/hitl_protocol"]
