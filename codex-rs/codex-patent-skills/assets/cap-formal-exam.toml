skill_id = "cap-formal-exam"
name = "形式审查能力"
description = "专利文件形式规范检查（实施细则第17-23条）"
instructions = """
## 激活场景
当需要检查专利文件的形式规范时激活此技能。

## 法律背景
- 实施细则第17条：说明书撰写顺序和禁止事项
- 实施细则第18条：说明书格式要求
- 实施细则第22条：从属权利要求引用格式
- 实施细则第23条：摘要格式（≤300字）

## 操作步骤

### 步骤1：标题检查
- 发明名称一般不超过25个字
- 不应含非技术词（人名、商标、型号）
- 请求书+说明书+摘要的名称完全一致

### 步骤2：权利要求形式检查
- 独立权利要求：前序部分+"其特征在于"+特征部分
- 从属权利要求："根据权利要求N所述的XXX，其特征在于，……"
- 引用号正确、不闭环引用
- 不得出现"优选""最佳"等禁止用语

### 步骤3：说明书形式检查
- 五部分按顺序存在且不空白
- 禁止出现"如权利要求N所述"（引用权利要求）
- 附图标记格式：名称后不加括号

### 步骤4：附图检查
- 所有附图有图名和简要说明
- 标注符一致、连续编号

## 质量标准
- 逐项检查不遗漏
- 标注错误位置和修改建议
- 分级：错误/警告/提示

## 常见错误
- 忽略标题字数限制
- 未发现说明书中引用权利要求
- 未检查附图标记与说明书的对应关系
"""
activates_agents = ["reviewer"]
related_concepts = ["说明书", "权利要求", "附图", "摘要"]
required_tools = ["FormalCheck", "QualityAssess"]
includes = ["_shared/output_standards"]
