skill_id = "cap-disclosure-exam"
name = "公开审查能力"
description = "判断说明书是否充分公开（专利法第26条第3款）"
instructions = """
## 激活场景
当需要审查说明书是否满足充分公开的要求时激活此技能。

## 法律背景
专利法第26条第3款：说明书应当对发明作出清楚、完整的说明，以所属技术领域的技术人员能够实现为准。

## 操作步骤

### 步骤1：清楚的检查
- 主题明确：写明发明是什么
- 术语准确：使用规范术语，无歧义
- 前后一致：同一概念始终用同一术语

### 步骤2：完整的检查
- 能否理解发明：从背景技术到具体实施方式是否完整
- 能否确定新颖性/创造性/实用性：是否公开了足够信息
- 权利要求支持：说明书的公开范围是否支持权利要求的范围

### 步骤3：能够实现的检查（五大无法实现情形）

情形1：只给任务不给手段 → "本发明旨在提供一种高效催化剂"但未给出任何催化剂组成/制备方法

情形2：手段含糊不清 → "适当调整反应条件""合理设置参数"无法确定具体范围

情形3：手段不能解决问题 → 声称解决"高温失效"但方案未涉及温度控制

情形4：部分手段无法实现 → 方案包含A+B+C但C按说明书无法实施

情形5：缺少实验证据 → 化学新用途发明未给出实验数据

## 质量标准
- 五个无法实现情形逐一检查
- 化学/生物领域特别关注实验数据要求

## 常见错误
- 仅检查说明书是否有足够的篇幅而忽略内容质量
- 未区分说明书的冗余内容与充分公开所需内容
"""
activates_agents = ["reviewer"]
related_concepts = ["充分公开", "说明书", "能够实现"]
required_tools = ["FormalCheck"]
includes = ["_shared/legal_reasoning", "_shared/output_standards", "_shared/patent_glossary"]
