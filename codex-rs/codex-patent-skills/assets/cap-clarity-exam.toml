skill_id = "cap-clarity-exam"
name = "清楚性审查能力"
description = "判断权利要求是否清楚简要（专利法第26条第4款）"
instructions = """
## 激活场景
当需要审查权利要求的清楚性时激活此技能。

## 法律背景
专利法第26条第4款：权利要求应当清楚、简要地限定要求保护的范围。

## 操作步骤

### 步骤1：声称保护范围的清晰性
- 权利要求的保护范围是否可通过权利要求自身确定
- 各项权利要求是否采用"包括"式（开放式）或"由……组成"式（封闭式）表达

### 步骤2：用词确定性检查
- 是否使用了含义不确定的词：厚、薄、强、弱、高温、高压（需有量化标准或本领域公知含义）
- 是否使用了模糊词：大约、左右、基本上、适当、一定、某种、或者其组合
- "例如""最好是""尤其是""必要时""约""接近"是否导致范围不清

### 步骤3：引用关系检查
- 从属权利要求引用号是否存在且正确
- 多项引用是否使用"任一项"等正确格式
- 是否存在循环引用

### 步骤4：简要性检查
- 权利要求是否包含与限定保护范围无关的表述
- 独立权利要求前序部分是否只写共有特征

## 质量标准
- 所有权利要求的保护范围是确定的
- 从属权利要求引用关系清楚正确
- 没有导致范围不确定的模糊表述

## 常见错误
- 审查时仅指出"不清楚"而不指明具体不清之处
- 忽略保护类型的类型混淆（产品+方法特征混用）
"""
activates_agents = ["reviewer", "quality_checker"]
related_concepts = ["清楚", "权利要求解释", "限定部分", "功能性特征"]
required_tools = ["ClaimParse", "FormalCheck"]
