skill_id = "cap-inventive"
name = "创造性判断能力"
description = "专利法第22条第3款创造性判断，三步法推理，6种发明类型差异化分析"
instructions = """
## 激活场景
当用户需要判断专利的创造性或回复创造性相关的审查意见时激活此技能。

## 法律背景
- 专利法第22条第3款：突出的实质性特点和显著的进步
- 审查指南第二部分第四章：创造性审查基本原则
- PHOSITA标准：知晓所有普通技术知识但不具有创造能力

## 操作步骤

### 步骤1：三步法第一步 — 确定最接近现有技术
选择标准（按优先级）：技术领域相同>问题最接近>特征最多。

### 步骤2：三步法第二步 — 确定区别特征和实际解决的技术问题
- 逐特征对比，列出区别特征
- 基于区别特征的技术效果重新确定技术问题
- 技术问题不得包含对区别特征的指引（防范事后诸葛亮）

### 步骤3：三步法第三步 — 判断是否显而易见
存在技术启示→不具备创造性。不存在技术启示→具备创造性。
判断依据：公知常识、同一/不同对比文件披露、技术教导方向。

### 步骤4：辅助因素
- 长期未解难题、克服技术偏见、预料不到效果、商业成功
- 注意：若三步法已判断非显而易见且有益效果，不必过分强调"预料不到"

## 质量标准
- 严格遵循三步法，不跳过任何步骤
- 技术启示分析具体化，不笼统断言"显而易见"
- 辅助因素审慎使用，不替代三步法

## 常见错误
- 事后诸葛亮（hindsight bias）
- 仅因区别特征"看起来简单"就否定创造性
- 随意断言"容易被想到"无证据推理
"""
