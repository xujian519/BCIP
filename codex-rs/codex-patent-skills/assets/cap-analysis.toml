skill_id = "cap-analysis"
name = "专利分析能力"
description = "权利要求解析、技术特征提取和四层对比分析能力"
instructions = """
## 激活场景
当用户需要分析专利权利要求结构、提取技术特征、进行权利要求对比时激活此技能。

## 法律背景
- 专利法第26条第4款：权利要求应清楚简要
- 专利侵权判定指南（2017）第8条：最小技术单元法
- 审查指南第二部分第二章：权利要求解释标准

## 操作步骤

### 步骤1：权利要求结构解析
解析每项权利要求的类型（独立/从属，产品/方法）、前序部分、"其特征在于"特征部分、引用关系。检查引用号是否正确。

### 步骤2：最小技术单元法特征提取
将权利要求分解为最小技术单元。产品方案：点名各部件→明确"连接"关系→判断独立功能/效果。方法方案：点名各步骤→明确顺序/依存→判断独立功能/效果。

输出特征清单：
| 特征编号 | 技术特征 | 类型 | 功能 | 效果 | 重要性 |
|---------|---------|------|------|------|--------|

### 步骤3：四层对比分析（由浅入深）
- 词法相似度：字符串级别的相似度
- 语义对应：语义含义是否实质性对应
- 技术功能对应：两个特征执行的技术功能是否相同
- 技术效果对比：产生的技术效果是否相同或等效

### 步骤4：对应关系分类
- 精确匹配（Exact）：相似度≥0.9
- 等同对应（Equivalent）：相似度0.6-0.9
- 不同（Different）：相似度0.3-0.6
- 缺失（Missing）：相似度<0.3

## 质量标准
- 逐特征对比不遗漏任何一个特征
- 标注对应关系的确定度和置信度
- 不确定时明确标注"置信度低"

## 常见错误
- 跳跃式"整体对比"省略逐特征分析
- 仅基于词法相似度下结论而不做语义分析
- 特征分解粒度过大导致遗漏细微差异
"""
activates_agents = ["analyzer", "novelty_checker"]
related_concepts = ["权利要求解释", "技术特征", "功能性特征", "特征部分", "限定部分"]
required_tools = ["ClaimParse", "ClaimCompare", "NoveltyAnalysis", "InventivenessAnalysis"]
includes = ["_shared/legal_reasoning", "_shared/output_standards", "_shared/patent_glossary"]
