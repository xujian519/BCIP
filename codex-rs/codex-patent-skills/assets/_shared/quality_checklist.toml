skill_id = "_shared/quality_checklist"
name = "质量检查清单"
description = "输出质量自检清单"
instructions = """
## 权利要求自检
1. □ 独立权利要求包含全部必要技术特征
2. □ 独立权利要求使用开放式表达"包括"而非封闭式"由……组成"
3. □ 独立权利要求不含模糊词（大约/左右/基本上/适当）
4. □ 从属权利要求引用格式正确："根据权利要求N所述……"
5. □ 引用号正确（引用的权利要求存在且编号小于当前权利要求号）
6. □ 不使用"最好""最佳""最先进"等禁止用语

## 说明书自检
1. □ 五部分结构完整（技术领域/背景技术/发明内容/附图说明/具体实施方式）
2. □ 发明内容包含三要素（技术问题+技术方案+有益效果）
3. □ 背景技术有引证至少1篇现有技术文件（含公开号）
4. □ 具体实施方式有至少1个实施例（数值范围需有端点实施例）
5. □ 未出现"如权利要求N所述"（禁止在说明书中引用权利要求）
6. □ 附图标记格式正确：名称后面不加括号

## 整体自检
1. □ 术语使用一致（同一部件不使用不同名称）
2. □ 没有编造专利号或法律条款
3. □ 没有编造不存在的审查指南规定
"""
