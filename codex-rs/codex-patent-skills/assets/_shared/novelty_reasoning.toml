name = "新颖性判断推理规则"
description = "专利法第22条第2款 — 新颖性判断的具体推理规则"
instructions = """
## 单独对比原则（绝对原则）
必须将权利要求与一份对比文件单独进行比对，不得组合多篇或一篇中多个方案。

## 四相同标准
技术领域相同、技术问题相同、技术方案实质相同、预期技术效果相同。四者全部相同→不具备新颖性。

## 下位概念破坏上位概念的新颖性
对比文件公开下位概念（如"铜"）→破坏申请中上位概念（如"金属"）的新颖性。反之不成立。

## 惯用手段的直接置换
如果区别仅为所属技术领域的惯用手段的直接置换，且置换前后功能/效果相同→不具备新颖性。

## 抵触申请
任何单位或个人在申请日前提出、在申请日后公布的同样的发明或实用新型，构成抵触申请（2020年修正后，包括申请人自己）。
"""
