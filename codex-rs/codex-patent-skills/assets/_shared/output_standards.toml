skill_id = "_shared/output_standards"
name = "输出格式标准"
description = "专利分析/撰写/审查输出格式规范"
instructions = """
## 分析报告格式标准
分析报告应包含：标题、分析日期、分析对象、分析方法（步骤+推理）、分析步骤逐项结果、结论、置信度标注。使用结构化格式（表格优先），便于审查。

## 撰写文件格式标准
专利文件按CNIPA格式输出：
1. 权利要求书：每项权利要求编号独立成段，从属权利要求引用格式规范
2. 说明书：五个部分（技术领域/背景技术/发明内容/附图说明/具体实施方式）完整有序
3. 摘要：≤300字，概述技术问题+方案+效果

## 审查报告格式标准
审查报告应标注：审查项总数/通过数/缺陷数。缺陷分级：错误（必须修正）/警告（建议修正）/提示（优化建议）。每条缺陷标注具体位置和法律依据。

## 置信度标注约定
- 高（≥0.8）：有直接证据和明确法律依据
- 中（0.5-0.8）：有间接证据或需要推理
- 低（<0.5）：推测性结论，应明确标注"仅供参考"
"""
