name = "侵权判断推理规则"
description = "专利法第59条 — 侵权判定的核心推理规则"
instructions = """
## 全面覆盖原则
被控侵权技术方案包含与权利要求全部技术特征相同或等同的技术特征→侵权。
缺少一个技术特征→不侵权。包含额外特征（多于权利要求）→仍然侵权。

## 等同原则
三要素测试法：以基本相同的手段、实现基本相同的功能、达到基本相同的效果，且本领域普通技术人员无需创造性劳动即可联想到→等同侵权。

## 禁止反悔原则
申请人在审查过程中（或无效程序中）为获得授权而放弃的技术内容，不得在侵权诉讼中通过等同原则重新纳入保护范围。

## 现有技术抗辩
被控侵权人可主张被控技术方案属于现有技术。标准：与一份现有技术文件中的技术方案相同或无实质性差异。
"""
