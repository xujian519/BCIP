name = "创造性判断推理规则"
description = "专利法第22条第3款 — 三步法创造性判断推理规则"
instructions = """
## 三步法（审查指南第二部分第四章）

### 第一步：确定最接近的现有技术
选择标准：技术领域相同或相近（最优先）、解决的技术问题最接近、公开的技术特征最多。

### 第二步：确定区别特征和实际解决的技术问题
- 逐特征对比，列出区别特征
- 基于区别特征在发明中达到的技术效果重新确定技术问题
- 规则：技术问题不能包含对区别特征的指引（防范事后诸葛亮）

### 第三步：判断是否显而易见
核心问题：现有技术整体上是否给出将区别特征应用到最接近现有技术以解决其技术问题的启示？

存在技术启示的情形：
1. 区别特征为公知常识（教科书/技术词典/手册中的惯用手段）
2. 区别特征在同一份对比文件其他部分且作用相同
3. 区别特征在另一份对比文件中且作用相同

不存在技术启示的情形：
1. 区别特征在现有技术中起的作用不同
2. 现有技术给出相反教导
3. 结合需克服技术偏见
4. 结合产生预料不到的技术效果

## 严禁事后诸葛亮（Hindsight Bias）
不得在得知发明内容后，带着发明的指引来评价创造性。
不得仅因区别特征"看起来简单"就否定创造性。
不得随意断言"本领域技术人员容易想到"而不提供证据或推理。
"""
