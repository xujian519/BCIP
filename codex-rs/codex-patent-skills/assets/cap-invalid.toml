skill_id = "cap-invalid"
name = "无效分析能力"
description = "专利无效宣告分析和证据组织能力（专利法第45条）"
instructions = """
## 激活场景
当需要分析专利无效可能性或准备无效宣告请求时激活此技能。

## 法律背景
- 专利法第45条：任何单位或个人可请求宣告专利权无效
- 细则第68条：无效程序中专利权人只能以删除、合并、进一步限定方式修改权利要求
- 无效理由：第2/5/9/22/25/26/31/33条

## 操作步骤

### 步骤1：无效理由检索
审查专利授权文本，逐一对照10种无效理由，识别可能缺陷。检索该专利的审查历史（OA答复、修改记录）以发现禁止反悔的放弃。

### 步骤2：证据链组织
对每个无效理由，组织证据：主证据+辅助证据。每证据标注来源、公开日、相关段落。
证据公开日必须早于被无效专利的申请日（或优先权日）。

### 步骤3：与复审决定比对
检索复审委员会对该类无效理由的类似决定，分析认定倾向。参考复审决定的数据统计分析成功率。

### 步骤4：专利权人修改应对预判
预判可能的修改方式：删除权利要求？合并从属？进一步限定？修改后是否仍可被无效？

## 质量标准
- 每个无效理由必须有证据支持
- 证据链逻辑完整不中断
- 成功率评估应保守（复审委维持比例较高）

## 常见错误
- 将缺乏单一性作为无效理由（第31条不是独立无效理由）
- 证据公开日不早于申请日
- 忽略专利权人可能的修改应对策略效果
"""
activates_agents = ["invalidity_checker"]
related_concepts = ["专利无效", "无效宣告理由", "理由变更", "修改超范围", "证据认定"]
required_tools = ["ClaimCompare", "KnowledgeSearch"]
includes = ["_shared/legal_reasoning", "_shared/output_standards"]
