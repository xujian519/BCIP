skill_id = "foundation-hitl"
name = "HITL基础规则"
description = "人机协作流程中的基本确认节点和级联规则"
instructions = """
## 激活场景
本技能为基础技能，所有法律相关的操作中都应遵守此HITL规则。

## 必须人工确认的节点
1. **检索式确认**：检索式构建后必须经人工确认再执行检索
2. **对比文件筛选**：前3篇最相关对比文件必须人工确认
3. **驳回策略选择**：Amend/Argue/Hybrid策略必须经人工选择
4. **权利要求修改**：独立权利要求范围调整必须人工确认
5. **最终文件审核**：完成的专利文件提交前必须经最终审核

## 可自动执行的节点
- 格式检查、规范性检查
- 引用关系验证
- 禁用词检测
- 结构完整性检查

## 确认方式
每个确认节点暂停并向用户展示：
1. 当前处理状态概述
2. 可选方案（通常2-3个）
3. 推荐方案及理由
4. 等待用户确认后继续

## 级联规则
- 如果在确认节点用户选择"重新执行"，回到上一节点重新处理
- 最多2轮重试，超过后要求用户提供更多信息
"""
activates_agents = ["retriever", "writer", "novelty_checker", "creativity_checker", "infringement_checker", "invalidity_checker", "reviewer", "quality_checker"]
