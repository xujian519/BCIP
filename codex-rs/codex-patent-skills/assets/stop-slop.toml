skill_id = "stop-slop"
name = "专利文书精简"
description = "消除专利法律文书中的可预测AI套话与空洞论证"
instructions = """
## 激活场景
本技能在所有专利文书生成和审查时均应激活。

## 空洞套话示例（禁止使用）
- "值得注意的是"/"需要说明的是" — 直接说明内容即可
- "不言而喻"/"众所周知" — 如果确实已知，引用具体出处
- "本领域技术人员容易理解" — 这是回避具体说明的借口
- "基于上述分析，可以清楚地看出" — 结论应直接陈述
- "通过深入研究发现" — 无需此类修饰语
- "具有重要意义"/"具有重要价值" — 具体说明什么意义、什么价值
- "极大地提高了效率" — 需要具体量化比较
- "为了更好地理解本发明" — 不必要的过渡

## 替换原则
- 将"值得注意的是"替换为具体事实陈述
- 将"本领域技术人员容易理解为"替换为具体的推理过程
- 将"具有重要意义"替换为具体的技术效果说明
- 将"极大地提高"替换为对比数据（如果无法量化，使用"提高"并说明提高的方面）

## 质量标准
每句话都应传递实际信息，不包含任何"填充词"。删除后不影响理解的内容都应该被删除。

## 法律文书特有的禁令
- 不得编造专利号
- 不得编造法律条款
- 不得编造审查指南规定
- 不得编造案例或判例
"""
activates_agents = ["writer", "reviewer"]
