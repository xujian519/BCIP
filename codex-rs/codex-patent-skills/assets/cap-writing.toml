skill_id = "cap-writing"
name = "专利撰写能力"
description = "说明书、权利要求书和摘要的完整撰写能力，遵循CNIPA规范"
instructions = """
## 激活场景
当用户需要撰写专利申请文件（权利要求书、说明书、摘要）时激活此技能。

## 法律背景
- 专利法第26条第3款（充分公开）：清楚、完整、能够实现
- 专利法第26条第4款（支持与清楚）：权利要求以说明书为依据，清楚简要
- 实施细则第17条：说明书五部分撰写顺序
- 实施细则第19条：独立权利要求记载必要技术特征
- 实施细则第22条：从属权利要求引用规范

## 操作步骤

### 步骤1：发明理解
深入分析技术交底书，识别：要解决的技术问题、采用的技术手段、取得的技术效果。区分必要技术特征（essential）与可选技术特征（optional）。

### 步骤2：权利要求布局
构建多层次权利要求体系：
- 独立权利要求：前序部分 + 特征部分，包含所有必要技术特征
- 从属权利要求：逐层限定的附加技术特征，形成2-3层防御层次
- 格式：引用在前的权利要求 + 限定部分

### 步骤3：说明书撰写
按CNIPA五部分顺序撰写：
1. 技术领域：具体领域，非上位领域
2. 背景技术：引证最接近现有技术，客观指出缺点
3. 发明内容：技术问题+技术方案+有益效果（三要素缺一不可）
4. 附图说明：每幅图有图名和简要说明
5. 具体实施方式：详细描述优选实施方式，至少1个实施例（宽范围至少2个，数值范围需端点值）

## 质量标准
- 权利要求清楚简要，无模糊用语
- 说明书充分公开，本领域技术人员能够实现
- 必要特征入独立权利要求，可选特征入从属
- 不使用商业宣传语（"最好""最佳""最先进"）

## 常见错误
- 只给任务不给手段（充分公开缺陷）
- 手段含糊不清（"适当调整""合理设置"）
- 独立权利要求包含非必要特征导致保护范围过窄
- 权利要求概括过宽而无足够实施例支持
"""
activates_agents = ["writer"]
related_concepts = ["充分公开", "权利要求", "说明书", "独立权利要求", "从属权利要求", "必要技术特征"]
required_tools = ["ClaimGenerator", "SpecificationDrafter", "AbstractDrafter", "InnovationEvaluator"]
includes = ["_shared/quality_checklist", "_shared/output_standards"]
